kind = "web"
previewPath = "/"
title = "FitTrack Pro"
version = "1.0.0"
id = "artifacts/fitness-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21558
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/fitness-app run dev"

[services.env]
PORT = "21558"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/fitness-app", "run", "build"]
publicDir = "artifacts/fitness-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
