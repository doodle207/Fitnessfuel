[build]
  command = "pnpm install && pnpm --filter @workspace/fitness-app run build"
  publish = "artifacts/fitness-app/dist/public"

[build.environment]
  BASE_PATH = "/"
  NODE_VERSION = "24"
  # Set VITE_API_URL in your Netlify dashboard (Site settings → Environment variables)
  # to point to your deployed Replit backend, e.g.:
  #   VITE_API_URL = https://your-backend.replit.app

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
