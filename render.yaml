databases:
  - name: fitnessfuel-db
    plan: free
    databaseName: fitnessfuel
    user: fitnessfuel

services:
  # Backend API (Express + Drizzle/Postgres)
  - type: web
    name: fitnessfuel-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      # Required: Postgres connection string
      - key: DATABASE_URL
        fromDatabase:
          name: fitnessfuel-db
          property: connectionString
      # Strongly recommended: replace the dev fallback secret
      - key: JWT_SECRET
        generateValue: true
      # If frontend is on a different domain (Render Static Site), cookies need SameSite=None
      - key: CROSS_ORIGIN_AUTH
        value: "true"
      # Set this after the frontend is deployed (e.g. https://fitnessfuel-web.onrender.com)
      - key: FRONTEND_URL
        value: ""
      # Optional integrations (set only if you use these features)
      - key: RESEND_API_KEY
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false
      - key: RAZORPAY_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: COUPON_CODE
        sync: false
      - key: COUPON_VOUCHER
        sync: false

  # Frontend (Vite)
  - type: web
    name: fitnessfuel-web
    env: static
    plan: free
    buildCommand: npm i -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/fitness-app build
    staticPublishPath: artifacts/fitness-app/dist/public
    envVars:
      # Supabase (used by the frontend)
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
